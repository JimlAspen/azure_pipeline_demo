$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json

type: command

name: gold_component
display_name: Gold Feature Engineering
version: 1

code: ../

inputs:
  silver_ready:
    type: uri_folder

command: >
  pip install azure-ai-ml &&
  python src/gold/gold.py
  --input_path abfss://lake@mockdeltalake.dfs.core.windows.net/lake/silver
  --output_path abfss://lake@mockdeltalake.dfs.core.windows.net/lake/gold
  --key_vault_url https://mlwdev9815209134.vault.azure.net/

environment: azureml:bronze-env@latest

identity:
  type: user_identity